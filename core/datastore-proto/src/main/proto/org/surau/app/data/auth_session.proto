syntax = "proto3";

option java_package = "org.surau.app.core.datastore";
option java_multiple_files = true;

// The signed-in session. An empty access_token means the user is a guest.
// This file is excluded from Android Auto Backup (see app backup/data extraction rules).
message AuthSession {
    string access_token = 1;
    string refresh_token = 2;
    int64 expires_at_epoch_seconds = 3;
    string session_id = 4;
    string user_id = 5;
    string email = 6;
    string display_name = 7;
    bool email_verified = 8;
}
