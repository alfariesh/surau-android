syntax = "proto3";

import "org/surau/app/data/dark_theme_config.proto";
import "org/surau/app/data/reader_mode.proto";
import "org/surau/app/data/theme_style.proto";
import "org/surau/app/data/theme_contrast.proto";

option java_package = "org.surau.app.core.datastore";
option java_multiple_files = true;

message UserPreferences {
    // Field numbers 1-16, 18, 20 were used by the Now in Android news domain
    // (followed topics, bookmarks, change list versions, theme brand, onboarding).
    reserved 1 to 16, 18, 20;

    DarkThemeConfigProto dark_theme_config = 17;

    bool use_dynamic_color = 19;

    // Quran reader preferences.
    ReaderModeProto reader_mode = 21;
    string translation_source_id = 22;
    string recitation_id = 23;
    // Arabic font scale multiplied by 100 (100 = 1.0x). 0 means unset.
    int32 arabic_font_scale_percent = 24;

    // Whether the first-launch welcome screen has been shown.
    bool welcome_shown = 25;

    // Flow (immersive surah-mode reader) preferences — local-only, not synced to the backend.
    // Flow Arabic font scale multiplied by 100 (100 = 1.0x). 0 means unset.
    int32 flow_arabic_font_scale_percent = 26;
    bool flow_show_translation = 27;
    // Inverse of "auto-continue to the next surah" so the default (unset = false) means enabled.
    bool flow_auto_continue_disabled = 28;
    // Inverse of "keep the screen on while playing" so the default (unset = false) means enabled.
    bool flow_keep_screen_on_disabled = 29;

    // Reader (normal SurahReader) advanced display preferences — local-only, not synced to the
    // backend (the backend stores no field for them).
    // Whether to show the Latin transliteration. Default (unset = false) means hidden.
    bool reader_show_transliteration = 30;
    // Inverse of "show the translation" so the default (unset = false) means shown.
    bool reader_translation_hidden = 31;
    // Arabic line-spacing multiplied by 100 (100 = 1.0x). 0 means unset.
    int32 reader_arabic_line_spacing_percent = 32;
    // Translation text scale multiplied by 100 (100 = 1.0x). 0 means unset.
    int32 reader_translation_scale_percent = 33;
    // Inverse of "keep the screen on while reading" so the default (unset = false) means enabled.
    bool reader_keep_screen_on_disabled = 34;

    // Custom theme seed color as a packed ARGB int (alpha is always 0xFF). 0 means "unset", in which
    // case the app falls back to the default HeroUI Pro (Zamrud) scheme. Local-only, not synced.
    int64 seed_color_argb = 35;
    // Vibrancy style applied when generating the scheme from `seed_color_argb`.
    ThemeStyleProto theme_style = 36;
    // Minimum text contrast enforced on the generated scheme.
    ThemeContrastProto theme_contrast = 37;

    // NEXT AVAILABLE ID: 38
}
