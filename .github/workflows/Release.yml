name: GitHub Release with APKs

on:
  workflow_dispatch:
  push:
    tags:
    - 'v*'

jobs:
  build:
    if: github.repository == 'alfariesh/surau-android'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy CI gradle.properties
        run: mkdir -p ~/.gradle ; cp .github/ci-gradle.properties ~/.gradle/gradle.properties

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # No release keystore on CI, so this is debug-signed via the graceful fallback in
      # app/build.gradle.kts. Good enough for a draft pre-release; swap in the Play key at M7.
      - name: Build release APK
        run: ./gradlew :app:assembleRelease

      - name: Create draft GitHub release with the APK
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: app/build/outputs/apk/release/app-release.apk
